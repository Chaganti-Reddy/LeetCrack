[build]
  base = "v2"
  command = "npm run build"
  publish = "v2/dist"
  functions = "netlify/functions"

[[redirects]]
  from = "/api/ac-sync"
  to = "/.netlify/functions/ac-sync"
  status = 200

[[redirects]]
  from = "/api/lc-sync"
  to = "/.netlify/functions/lc-sync"
  status = 200

[[redirects]]
  from = "/api/cf-sync"
  to = "/.netlify/functions/cf-sync"
  status = 200

[[redirects]]
  from = "/api/contests-proxy"
  to = "/.netlify/functions/contests-proxy"
  status = 200

# SPA catch-all — React Router
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200